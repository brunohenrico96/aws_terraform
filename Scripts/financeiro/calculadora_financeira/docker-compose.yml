version: "3.9"

services:
  motor_financeiro:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: motor_financeiro_v2
    ports:
      - "8501:8501"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx reverso (opcional — útil para produção com SSL)
