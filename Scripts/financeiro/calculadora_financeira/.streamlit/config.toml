[theme]
base = "dark"
primaryColor = "#f0b429"
backgroundColor = "#0a1628"
secondaryBackgroundColor = "#0d1f3c"
textColor = "#e2e8f0"
font = "sans serif"

[server]
port = 8501
headless = true
enableCORS = true
enableXsrfProtection = true
maxUploadSize = 10

[browser]
gatherUsageStats = false
serverAddress = "0.0.0.0"

[logger]
level = "warning"
