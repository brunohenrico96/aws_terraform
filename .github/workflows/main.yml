name: 'Terraform CI'

on:
  push:
    branches:
      - main # O robô roda toda vez que você enviar código para a branch main
  pull_request:

jobs:
  terraform:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest # A máquina virtual gratuita que o GitHub nos empresta

    # Injetando as credenciais da AWS direto do GitHub Secrets de forma segura
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
    # 1. Baixa o seu código para a máquina do GitHub
    - name: Checkout Repo
      uses: actions/checkout@v3

    # 2. Instala o executável do Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    # 3. Inicia o Terraform (baixa os plugins da AWS e conecta no S3)
    - name: Terraform Init
      run: terraform init

    # 4. Verifica se a formatação do código está correta
    - name: Terraform Validate
      run: terraform validate

    # 5. Roda a simulação: o que vai mudar na AWS?
    - name: Terraform Plan
      run: terraform plan
