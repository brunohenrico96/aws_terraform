version: "3.9"

services:
  calculadora_financeira:
    build:
      context: ../..
      dockerfile: apps/calculadora_financeira/Dockerfile
    container_name: calculadora_financeira
    ports:
      - "8501:8501"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
